---
- name: Configure Monitoring Server
  hosts: monitoring_server
  become: yes
  vars:
    prometheus_port: 9090
    grafana_port: 3000

  tasks:
    # Install Docker
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Ensure Docker is running
      systemd:
        name: docker
        state: started
        enabled: yes

    # Run Prometheus
    - name: Run Prometheus container
      docker_container:
        name: prometheus
        image: prom/prometheus:latest
        state: started
        restart_policy: always
        ports:
          - "{{ prometheus_port }}:9090"

    # Run Grafana
    - name: Run Grafana container
      docker_container:
        name: grafana
        image: grafana/grafana:latest
        state: started
        restart_policy: always
        ports:
          - "{{ grafana_port }}:3000"
        env:
          GF_SECURITY_ADMIN_USER: admin
          GF_SECURITY_ADMIN_PASSWORD: admin

    # Install Cloudflare Tunnel
    - name: Download and install cloudflared
      apt:
        deb: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb

    - name: Ensure cloudflared service is running
      systemd:
        name: cloudflared
        state: started
        enabled: yes
